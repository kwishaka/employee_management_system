# ===== SERVER =====
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ===== DATABASE =====
spring.datasource.url=jdbc:postgresql://localhost:5432/employee_db
spring.datasource.username=postgres
spring.datasource.password=admin@123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== MULTIPART FILE UPLOAD (CRITICAL) =====
# Enable multipart uploads
spring.servlet.multipart.enabled=true

# Maximum file size (10MB)
spring.servlet.multipart.max-file-size=10MB

# Maximum request size (10MB total for all files)
spring.servlet.multipart.max-request-size=10MB

# Location to store temporary files
spring.servlet.multipart.location=C:/Users/HP/OneDrive/Desktop/employee-management-system/uploads

# File size threshold for writing to disk (2KB)
spring.servlet.multipart.file-size-threshold=2KB

# Resolve lazily (parse only when needed)
spring.servlet.multipart.resolve-lazily=false

# ===== FILE STORAGE =====
file.upload-dir=./uploads

# ===== LOGGING =====
logging.level.com.ems=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.multipart=DEBUG
logging.level.org.apache.catalina=DEBUG
String trackingId = "APP-" + System.currentTimeMillis();

application.setTrackingId(trackingId);
application.setStatus(ApplicationStatus.PENDING);